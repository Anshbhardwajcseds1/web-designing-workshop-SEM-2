<!DOCTYPE html>
<html>
<body>
<h1>
    <center>Pattern :- Inverted Half Pyramid</center>
</h1>
<script>

    for (let i = 5; i >= 1; i--) {
        let star = "";

        for (let j = 1; j <= i; j++) {
            star = star + "*";
        }

        console.log(star);
    }

</script>

</body>
</html>
